name: Move HTML v2
on: push
permissions:
  contents: write
jobs:
  move:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Move file
        shell: bash
        run: |
          cp public/index.html public/index-v1.0.html
          cp index.html public/index.html
          rm index.html
          rm -f .github/workflows/move-html.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "v2 deployed from root to public"
          git push
